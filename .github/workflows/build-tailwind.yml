name: Build Tailwind CSS

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build books JSON
        run: npm run build:books

      - name: Build Tailwind CSS
        run: npx tailwindcss -i ./src/input.css -o ./docs/dist/output.css --minify

      - name: Commit generated files
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add docs/dist/output.css docs/data/books-2026.json
          git diff --staged --quiet || git commit -m "🤖 Auto-build site assets"
          git push
